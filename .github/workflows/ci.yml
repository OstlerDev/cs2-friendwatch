name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test-and-build:
    name: Test & build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --locked

      - name: Release build
        run: cargo build --release --locked
